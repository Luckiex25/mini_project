<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BagStore</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #faf8f5; color: #2c1810; }
    .navbar { background: #1a1a1a !important; border-bottom: 1px solid #333; padding: 12px 0; }
    .navbar-brand { font-family: 'Playfair Display', serif; font-size: 22px; color: #c9a882 !important; letter-spacing: 1px; }
    .nav-link { color: rgba(255,255,255,0.7) !important; font-size: 14px; font-weight: 500; transition: color .2s; }
    .nav-link:hover { color: #c9a882 !important; }
    .dropdown-menu { border: none; box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-radius: 12px; padding: 8px; }
    .dropdown-item { border-radius: 8px; padding: 8px 14px; font-size: 14px; transition: background .2s; }
    .dropdown-item:hover { background: #f5f0e8; color: #2c1810; }
    .btn-dark { background: #1a1a1a; border: none; border-radius: 10px; font-weight: 500; padding: 9px 20px; transition: all .2s; }
    .btn-dark:hover { background: #3d2b1f; transform: translateY(-1px); }
    .btn-outline-dark { border-radius: 10px; font-weight: 500; padding: 9px 20px; }
    .alert { border-radius: 12px; border: none; font-size: 14px; }
  </style>
</head>
<body>
  {% include 'navbar.html' %}
  <div class="container mt-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
