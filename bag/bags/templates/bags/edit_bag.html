{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">Edit Bag</h2>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Bag Name *</label>
        <input type="text" name="name" class="form-control" value="{{ bag.name }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Brand</label>
        <input type="text" name="brand" class="form-control" value="{{ bag.brand }}">
      </div>
      <div class="row">
        <div class="col mb-3">
          <label class="form-label">Price (THB) *</label>
          <input type="number" step="1" name="price" class="form-control" value="{{ bag.price }}" required>
        </div>
        <div class="col mb-3">
          <label class="form-label">Stock Quantity</label>
          <input type="number" name="stock" class="form-control" value="{{ bag.stock }}" min="0">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3">{{ bag.description }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Image URL</label>
        <input type="url" name="image_url" class="form-control" value="{{ bag.image_url }}">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-dark">Save</button>
        <a href="{{ url_for('bags.index') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
