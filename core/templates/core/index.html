{% extends 'layout.html' %}
{% block content %}
<div class="text-center py-5">
  <h1>Wellcome to BagStore</h1>
  <p class="text-muted">Manage your bag inventory</p>
  {% if current_user.is_authenticated %}
    <a href="{{ url_for('bags.index') }}" class="btn btn-dark">View all products</a>
  {% else %}
    <a href="{{ url_for('users.login') }}" class="btn btn-dark me-2">Login</a>
    <a href="{{ url_for('users.register') }}" class="btn btn-outline-dark">Register</a>
  {% endif %}
</div>
{% endblock %}
