{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 text-center">
    <img src="{{ url_for('static', filename='img/avatar.png') }}" width="80">
    <h3>{{ current_user.username }}</h3>
    <p class="text-muted">{{ current_user.email }}</p>
    <p class="text-muted small">Registered on {{ current_user.created_at.strftime('%d/%m/%Y') }}</p>
    <div class="d-flex gap-2 justify-content-center mt-3">
      <a href="{{ url_for('bags.index') }}" class="btn btn-dark">View Bags</a>
      <a href="{{ url_for('users.change_password') }}" class="btn btn-outline-dark">Change Password</a>
    </div>
  </div>
</div>
{% endblock %}
