{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center mt-3">
  <div class="col-md-8">
    <h4 class="mb-4">Profile Page</h4>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h6 class="text-muted mb-4">Profile Information</h6>
        <hr>

        <form method="POST">
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label text-muted small">Username</label>
              <input type="text" class="form-control bg-light" 
                     value="{{ current_user.username }}" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label text-muted small">Email Address</label>
              <input type="email" name="email" class="form-control" 
                     value="{{ current_user.email }}">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label text-muted small">Firstname</label>
              <input type="text" name="firstname" class="form-control" 
                     value="{{ current_user.firstname or '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label text-muted small">Lastname</label>
              <input type="text" name="lastname" class="form-control" 
                     value="{{ current_user.lastname or '' }}">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label text-muted small">Member since</label>
              <input type="text" class="form-control bg-light" 
                     value="{{ current_user.created_at.strftime('%d/%m/%Y') }}" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label text-muted small">Total Bags</label>
              <input type="text" class="form-control bg-light" 
                     value="{{ current_user.bags|length }} bags" readonly>
            </div>
          </div>

          <hr>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark">Update Profile</button>
            <a href="{{ url_for('bags.index') }}" class="btn btn-outline-dark">View Bags</a>
            <a href="{{ url_for('users.change_password') }}" class="btn btn-outline-dark">Change Password</a>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
